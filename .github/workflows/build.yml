name: Build SmartEye

on:
  workflow_dispatch:
    inputs:
      include_models:
        description: "Bundle data/models into artifact (increases size)"
        required: false
        default: "false"
      max_dist_mb:
        description: "Maximum allowed dist size in MB"
        required: false
        default: "3072"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade ordered-set zstandard nuitka

      - name: Clean previous output
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item -Recurse -Force build
          }

      - name: Build standalone executable (safe profile)
        shell: pwsh
        env:
          INCLUDE_MODELS: ${{ github.event.inputs.include_models || 'false' }}
        run: |
          $args = @(
            "--standalone",
            "--output-dir=build",
            "--output-filename=SmartEye",
            "--remove-output",
            "--jobs=2",
            "--lto=no",
            "--windows-console-mode=disable",
            "--enable-plugin=pyside6",
            "--include-package=backend",
            "--include-package=frontend",
            "--include-package=utils",
            "--include-package=psutil",
            "--include-package=PySide6",
            "--include-package=shiboken6",
            "--include-package=reportlab",
            "--include-package=requests",
            "--include-package=pyqtgraph",
            "--include-package=onnx",
            "--include-package=onnxruntime",
            "--include-package=insightface",
            "--include-package=GPUtil",
            "--include-package=wmi",
            "--include-package=streamlink",
            "--include-package-data=reportlab",
            "--include-package-data=pyqtgraph",
            "--include-package-data=insightface",
            "--include-package-data=onnxruntime",
            "--include-package-data=streamlink",
            "--include-data-dir=frontend/assets=frontend/assets",
            "--include-data-file=app_info.json=app_info.json",
            "--include-data-file=backend/database/schema.sql=backend/database/schema.sql",
            "--nofollow-import-to=PySide6.QtWebEngine",
            "--nofollow-import-to=PySide6.QtWebEngineWidgets",
            "--nofollow-import-to=PySide6.QtWebEngineCore",
            "--nofollow-import-to=onnxruntime.training",
            "--nofollow-import-to=unittest",
            "--nofollow-import-to=test",
            "--nofollow-import-to=doctest",
            "--noinclude-data-files=**/tests/**",
            "--noinclude-data-files=**/test/**",
            "--assume-yes-for-downloads",
            "--show-progress",
            "--show-memory",
            "main.py"
          )

          if ($env:INCLUDE_MODELS -eq "true" -and (Test-Path "data/models")) {
            $args += "--include-data-dir=data/models=data/models"
          }

          python -m nuitka @args

      - name: Validate output and size limit
        id: verify
        shell: pwsh
        env:
          MAX_DIST_MB: ${{ github.event.inputs.max_dist_mb || '3072' }}
        run: |
          $distDir = Join-Path $PWD "build\main.dist"
          $exePath = Join-Path $distDir "SmartEye.exe"

          if (-not (Test-Path $exePath)) {
            throw "Build failed: SmartEye.exe not found at $exePath"
          }

          $bytes = (Get-ChildItem -Path $distDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $mb = [math]::Round($bytes / 1MB, 2)
          $maxMb = [double]$env:MAX_DIST_MB

          if ($mb -gt $maxMb) {
            throw "Dist size ${mb}MB exceeds limit ${maxMb}MB"
          }

          "dist_dir=$distDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "dist_mb=$mb" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Dist size: ${mb}MB"

      - name: Create zip artifact
        id: package
        shell: pwsh
        run: |
          $archive = Join-Path $PWD "build\SmartEye-main-dist.zip"
          if (Test-Path $archive) {
            Remove-Item -Force $archive
          }

          Compress-Archive -Path "${{ steps.verify.outputs.dist_dir }}\*" -DestinationPath $archive -CompressionLevel Optimal
          "artifact_path=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartEye-main-dist
          path: ${{ steps.package.outputs.artifact_path }}
          retention-days: 14
