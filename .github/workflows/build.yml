name: Build SmartEye

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      include_models:
        description: "Bundle data/models into artifact (increases size)"
        required: false
        default: "false"
      max_dist_mb:
        description: "Maximum allowed dist size in MB"
        required: false
        default: "3072"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade ordered-set zstandard nuitka

      - name: Cache Nuitka compilation cache
        uses: actions/cache@v4
        with:
          path: ~/.nuitka
          key: nuitka-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      - name: Clean previous output
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item -Recurse -Force build
          }

      - name: Remove duplicate insightface mesh cython
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path "C:/hostedtoolcache/windows/Python/3.12.*/x64/insightface/thirdparty/face3d/mesh/cython" -Directory -ErrorAction SilentlyContinue
          if ($found) {
            foreach ($dir in $found) {
              Write-Host "Removing duplicate: $($dir.FullName)"
              Remove-Item -Recurse -Force $dir.FullName
            }
          } else {
            Write-Host "No duplicate global cython found."
          }

      - name: Validate version from app_info.json
        id: appinfo
        shell: pwsh
        run: |
          $appInfo = Get-Content app_info.json | ConvertFrom-Json
          $version = "$($appInfo.version)"
          if (-not $version) {
            throw "app_info.json version is missing"
          }
          if ($version -notmatch '^\d+\.\d+') {
            throw "app_info.json version '$version' does not match expected format (e.g. 1.0 or 1.0.0)"
          }
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build standalone executable
        shell: pwsh
        env:
          INCLUDE_MODELS: ${{ github.event.inputs.include_models || 'false' }}
        run: |
          $buildArgs = @(
            "--standalone",
            "--output-dir=build",
            "--output-filename=SmartEye",
            "--remove-output",
            "--lto=no",
            "--windows-console-mode=disable",
            "--enable-plugin=pyside6",
            "--include-package=backend",
            "--include-package=frontend",
            "--include-package=utils",
            "--include-package=psutil",
            "--include-package=PySide6",
            "--include-package=shiboken6",
            "--include-package=reportlab",
            "--include-package=requests",
            "--include-package=pyqtgraph",
            "--include-package=onnx",
            "--include-package=onnxruntime",
            "--include-package=insightface",
            "--include-package=GPUtil",
            "--include-package=wmi",
            "--include-package=streamlink",
            "--include-package-data=reportlab",
            "--include-package-data=pyqtgraph",
            "--include-package-data=insightface",
            "--include-package-data=onnxruntime",
            "--include-package-data=streamlink",
            "--include-data-dir=frontend/assets=frontend/assets",
            "--include-data-file=app_info.json=app_info.json",
            "--include-data-file=backend/database/schema.sql=backend/database/schema.sql",
            "--nofollow-import-to=PySide6.QtWebEngine",
            "--nofollow-import-to=PySide6.QtWebEngineWidgets",
            "--nofollow-import-to=PySide6.QtWebEngineCore",
            "--nofollow-import-to=onnxruntime.training",
            "--nofollow-import-to=unittest",
            "--nofollow-import-to=test",
            "--nofollow-import-to=doctest",
            "--noinclude-data-files=**/tests/**",
            "--noinclude-data-files=**/test/**",
            "--assume-yes-for-downloads",
            "--show-progress",
            "--show-memory",
            "main.py"
          )

          if ($env:INCLUDE_MODELS -eq "true" -and (Test-Path "data/models")) {
            $buildArgs += "--include-data-dir=data/models=data/models"
          }

          python -m nuitka @buildArgs

      - name: Validate output and size limit
        id: verify
        shell: pwsh
        env:
          MAX_DIST_MB: ${{ github.event.inputs.max_dist_mb || '3072' }}
        run: |
          $distDir = Join-Path $PWD "build\main.dist"
          $exePath = Join-Path $distDir "SmartEye.exe"

          if (-not (Test-Path $exePath)) {
            throw "Build failed: SmartEye.exe not found at $exePath"
          }

          $bytes = (Get-ChildItem -Path $distDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $mb = [math]::Round($bytes / 1MB, 2)
          $maxMb = [double]$env:MAX_DIST_MB

          if ($mb -gt $maxMb) {
            throw "Dist size ${mb}MB exceeds limit ${maxMb}MB"
          }

          "dist_dir=$distDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "dist_mb=$mb" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Dist size: ${mb}MB"

      - name: Create 7z artifact
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.appinfo.outputs.app_version }}"
          $archiveName = "SmartEye-v$version-main-dist.7z"
          $archive = Join-Path $PWD "build\$archiveName"

          if (Test-Path $archive) {
            Remove-Item -Force $archive
          }

          $distDir = "${{ steps.verify.outputs.dist_dir }}"
          & "C:\Program Files\7-Zip\7z.exe" a -t7z -m0=lzma2 -mx=9 -mmt=on -ms=on "$archive" "$distDir\*"

          if ($LASTEXITCODE -ne 0) {
            throw "7-Zip compression failed with exit code $LASTEXITCODE"
          }

          "archive_name=$archiveName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_path=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartEye-main-dist
          path: ${{ steps.package.outputs.artifact_path }}
          retention-days: 14

      - name: Create or update GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.appinfo.outputs.app_version }}"
          $tag = "v$version"
          $title = "SmartEye $tag"
          $asset = "${{ steps.package.outputs.artifact_path }}"

          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $asset --repo "${{ github.repository }}" --title $title --generate-notes
          } else {
            gh release upload $tag $asset --repo "${{ github.repository }}" --clobber
          }